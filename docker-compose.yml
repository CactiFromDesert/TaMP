services:
  postgres:
    image: postgres:16-alpine
    container_name: auth_postgres
    environment:
      POSTGRES_DB: usersauth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
    ports:
      - "5432:5432" # Теперь вы можете при желании подключиться к БД даже с хоста (через DBeaver/pgAdmin)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app_network

  calculation_server:
    build:
      context: .
      dockerfile: Server/Dockerfile.server
    container_name: calc_server
    ports:
      - "11999:11999" # Пробрасывает порт вычислений на локальную машину
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  auth:
    build:
      context: .
      dockerfile: Auth/Dockerfile.auth
    container_name: auth_service
    ports:
      - "11998:11998"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=usersauth
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data: